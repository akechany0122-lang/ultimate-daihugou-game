<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ULTIMATE DAIHUGOU: DEATH GAME</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Cinzel:wght@700&family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg-iron: #111;
      --bg-rust: #2a0800;
      --color-blood: #8a0303;
      --color-gold: #D4AF37; /* VIP Casino Gold */
      --card-width: 90px;
      --card-height: 130px;
      --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.8);
      --font-main: 'Cormorant Garamond', 'Noto Serif JP', serif;
    }

    body {
      font-family: var(--font-main);
      margin: 0;
      padding: 0;
      background-color: #4A0E1B; /* VIP Casino Bordeaux */
      color: #ccc;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image:
        radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.7) 100%),
        repeating-radial-gradient(ellipse at center, rgba(0, 0, 0, 0.1) 0px, transparent 2px),
        linear-gradient(135deg, #4A0E1B 0%, #2A0510 100%);
    }

    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* 全体フィルター効果 (11バック、8切り暗転など) */
    .screen-filter {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 150;
      transition: all 1s;
    }

    .filter-11back {
      background: rgba(138, 3, 3, 0.35);
      /* 軽量な半透明カラー */
      mix-blend-mode: multiply;
      /* backdrop-filterの代替となる軽量なブレンド効果 */
    }

    .filter-8cut {
      background: rgba(0, 0, 0, 0.8);
      transition: background 0.1s;
    }

    /* 11バック用の逆回転時計の影 */
    .bg-clock {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vh;
      height: 80vh;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/><line x1="50" y1="50" x2="50" y2="20" stroke="rgba(255,255,255,0.08)" stroke-width="4" stroke-linecap="round"/><line x1="50" y1="50" x2="30" y2="50" stroke="rgba(255,255,255,0.08)" stroke-width="3" stroke-linecap="round"/></svg>') no-repeat center center;
      background-size: contain;
      transition: opacity 1s;
    }

    .bg-clock.active {
      opacity: 1;
      animation: spin-reverse 10s linear infinite;
    }

    @keyframes spin-clockwise {
      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes spin-counter-clockwise {
      100% {
        transform: translate(-50%, -50%) rotate(-360deg);
      }
    }

    /* 9リバース: 複雑で発光する同心円状のルーン魔法陣インジケーター */
    .bg-reverse-indicator {
      position: absolute;
      top: 45.5%; /* カード中央の配置に合わせる */
      left: 50%;
      width: 55vh; /* 38vh -> 55vh に拡大 */
      height: 55vh; /* 38vh -> 55vh に拡大 */
      transform: translate(-50%, -50%);
      transform-origin: center center;
      pointer-events: none;
      z-index: 0;
      background: transparent;
    }

    /* レイヤー1: メインのルーン魔法陣 (本体) */
    .bg-reverse-indicator::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"><defs><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.5" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs><g stroke="rgba(215,175,115,0.45)" fill="none" stroke-width="1.2" filter="url(%23glow)"><circle cx="250" cy="250" r="240" stroke-width="1.8"/><circle cx="250" cy="250" r="232" stroke-width="1"/><circle cx="250" cy="250" r="192" stroke-width="1.2"/><circle cx="250" cy="250" r="184" stroke-width="1.5"/><circle cx="250" cy="250" r="140" stroke-width="1"/><circle cx="250" cy="250" r="75" stroke-width="1.2"/><circle cx="250" cy="250" r="35" stroke-dasharray="2,2"/><polygon points="250,66 409.3,342 90.7,342" stroke-width="1.2"/><polygon points="250,434 409.3,158 90.7,158" stroke-width="1.2"/><line x1="250" y1="15" x2="250" y2="485" stroke-width="0.6" stroke-dasharray="20,10"/><line x1="15" y1="250" x2="485" y2="250" stroke-width="0.6" stroke-dasharray="20,10"/><line x1="90.7" y1="158" x2="409.3" y2="342" stroke-width="0.6"/><line x1="90.7" y1="342" x2="409.3" y2="158" stroke-width="0.6"/><path id="runePath" d="M 250, 40 A 210,210 0 1,1 249.9,40" fill="none" stroke="none" /><text font-family="monospace" font-size="20" fill="rgba(215,175,115,0.45)" letter-spacing="6.8" font-weight="bold"><textPath href="%23runePath">ᚠᚢᚦᚨᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟ᛫ᚠᚢᚦᚨᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟ᛫ᚠᚢᚦᚨᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟ᛫</textPath></text></g></svg>');
      background-size: cover;
      background-position: center;
      transform: scale(1.8);
      opacity: 0.45;
      transform-origin: center center;
    }

    /* レイヤー2: モーションブラー・残像粒子トレイル (少しずらして回転) */
    .bg-reverse-indicator::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"><g stroke="rgba(215,175,115,0.2)" fill="none" stroke-width="1"><circle cx="250" cy="250" r="232" stroke-width="1"/><circle cx="250" cy="250" r="184" stroke-width="1"/><circle cx="250" cy="250" r="140" stroke-width="1"/><polygon points="250,66 409.3,342 90.7,342" stroke-width="0.8"/><polygon points="250,434 409.3,158 90.7,158" stroke-width="0.8"/></g></svg>');
      background-size: cover;
      background-position: center;
      transform: scale(1.8);
      filter: blur(2px);
      opacity: 0.22;
      transform-origin: center center;
    }

    /* 回転アニメーションの速度指定 (時計回り) */
    .bg-reverse-indicator.spin-clockwise::before {
      animation: spin-clockwise-indicator 20s linear infinite;
    }
    .bg-reverse-indicator.spin-clockwise::after {
      animation: spin-clockwise-indicator 20s linear infinite;
      animation-delay: -0.2s; /* わずかに遅れた残像トレイル効果 */
    }

    /* 回転アニメーションの速度指定 (反時計回り) */
    .bg-reverse-indicator.spin-counter-clockwise::before {
      animation: spin-counter-clockwise-indicator 20s linear infinite;
    }
    .bg-reverse-indicator.spin-counter-clockwise::after {
      animation: spin-counter-clockwise-indicator 20s linear infinite;
      animation-delay: -0.2s; /* わずかに遅れた残像トレイル効果 */
    }

    @keyframes spin-clockwise-indicator {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-counter-clockwise-indicator {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(-360deg);
      }
    }

    .btn-start-game {
      background: rgba(0, 0, 0, 0.7);
      color: var(--color-blood);
      border: 1px solid var(--color-blood);
      padding: 12px 10px;
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      cursor: pointer;
      position: relative;
      z-index: 1001;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(138, 3, 3, 0.3);
      width: 320px;
      margin-bottom: 12px;
      white-space: nowrap;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    .btn-start-game:hover {
      background: var(--color-blood);
      color: #fff;
      box-shadow: 0 0 20px var(--color-blood);
      transform: translateY(-2px);
    }

    .btn-secondary {
      font-size: 0.9rem;
      padding: 8px 15px;
      width: 180px;
      opacity: 0.8;
      border-color: #555;
      color: #aaa;
    }

    /* カード説明画面 */
    .explanation-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      height: 85vh;
      background: rgba(10, 10, 10, 0.98);
      border: 2px solid var(--color-gold);
      box-shadow: 0 0 50px rgba(0, 0, 0, 1);
      border-radius: 20px;
      z-index: 20000;
      display: flex;
      flex-direction: column;
      padding: 30px;
      color: #fff;
    }

    .explanation-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .explanation-header h2 {
      font-family: 'Cinzel', serif;
      color: #e5c197; /* アンティークゴールド */
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .explanation-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding-top: 10px;
    }

    /* カスタムスクロールバー */
    .explanation-list::-webkit-scrollbar {
      width: 8px;
    }
    .explanation-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    .explanation-list::-webkit-scrollbar-thumb {
      background: var(--color-gold);
      border-radius: 4px;
    }

    .explanation-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      transition: all 0.3s;
    }

    .explanation-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--color-gold);
    }

    .explanation-card-view {
      width: 60px;
      height: 85px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .explanation-text {
      flex: 1;
    }

    .explanation-card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      color: var(--color-gold);
      margin-bottom: 4px;
    }

    .explanation-card-desc {
      font-size: 0.82rem;
      color: #ccc;
      line-height: 1.3;
    }

    /* レスポンシブ対応 (Mobile) */
    @media (max-width: 768px) {
      :root {
        --card-width: 35px;
        --card-height: 50px;
      }

      .btn-start-game {
        width: 260px;
        font-size: 0.95rem;
        padding: 10px;
      }

      .title-logo {
        width: 280px;
      }

      .explanation-overlay {
        width: 95vw;
        height: 90vh;
        padding: 15px;
      }

      .explanation-list {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .table-container {
        transform: scale(0.95);
      }

      .field-area {
        transform: scale(0.65);
      }

      .discard-pile {
        transform: scale(0.65);
      }

      .player-area.player-1,
      .player-area.player-2,
      .player-area.player-3 {
        transform: scale(0.6);
      }

      .action-panel {
        bottom: 30px;
        transform: translateX(-50%) scale(0.85);
      }

      .player-pos.pos-bottom {
        bottom: 45px !important;
        height: 130px !important;
        transform: translateX(-50%) scale(1.0);
        z-index: 300 !important;
      }

      .altar-container {
        position: fixed;
        top: 10px;
        right: 10px;
        transform: scale(0.5);
        transform-origin: top right;
        margin: 0;
        z-index: 1000;
      }

      .player-info {
        font-size: 0.8rem;
        padding: 4px 10px;
      }

      .card-rank {
        font-size: 0.75rem;
      }

      .explanation-card-desc {
        font-size: 0.72rem;
      }

      .btn-pass {
        font-size: 0.9rem;
        padding: 10px 20px;
      }
    }

    .btn-close-explanation {
      margin-top: 20px;
      align-self: center;
    }

    /* PASS表示スタイル */
    .player-pass-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1500;
      pointer-events: none;
    }
    .pos-top .player-pass-wrapper { top: 60px; transform: translate(-50%, -50%) rotate(180deg); }
    .pos-left .player-pass-wrapper { top: 60px; transform: translate(-50%, -50%) rotate(-90deg); }
    .pos-right .player-pass-wrapper { top: 60px; transform: translate(-50%, -50%) rotate(90deg); }
    .pos-bottom .player-pass-wrapper { top: -70px; }

    .player-pass-label {
      background: transparent;
      color: #ffcccc;
      padding: 8px 25px;
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 0.3rem;
      border: none;
      border-radius: 6px;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 0 0 5px black;
      animation: fadeInPass 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes fadeInPass {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Jバック 永続的背景効果（より重厚なダークファンタジーオーラ） */
    .bg-jback-indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(138, 3, 3, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(211, 84, 0, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.4) 0%, rgba(20, 10, 5, 0.6) 100%);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }

    .bg-jback-indicator.active {
      opacity: 1;
      animation: pulse-jback-aura 4s ease-in-out infinite alternate;
    }

    .bg-jback-indicator::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
      opacity: 0.3;
      pointer-events: none;
    }

    @keyframes pulse-jback-aura {
      0% {
        opacity: 0.5;
        box-shadow: inset 0 0 100px rgba(138, 3, 3, 0.3);
      }

      100% {
        opacity: 0.9;
        box-shadow: inset 0 0 200px rgba(230, 126, 34, 0.4);
      }
    }

    /* 革命 永続的背景効果（青紫の不気味なオーラ） */
    .bg-revolution-indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 10%, rgba(72, 0, 138, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 10% 80%, rgba(0, 72, 138, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.2) 0%, rgba(10, 0, 30, 0.7) 100%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }

    .bg-revolution-indicator.active {
      opacity: 1;
      animation: pulse-revolution-aura 5s ease-in-out infinite alternate;
    }

    @keyframes pulse-revolution-aura {
      0% {
        opacity: 0.4;
        filter: hue-rotate(0deg) contrast(1.1);
      }
      100% {
        opacity: 0.8;
        filter: hue-rotate(15deg) contrast(1.3);
      }
    }

    /* 墓地シャッフル演出 */
    @keyframes gy-shake {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-5px, 5px);
      }

      50% {
        transform: translate(5px, -5px);
      }

      75% {
        transform: translate(-5px, -5px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    .graveyard-shuffle {
      animation: gy-shake 0.1s infinite;
    }

    /* Kウォッチ対象選択 */
    .watch-clickable {
      cursor: pointer;
      position: relative;
    }

    /* Kウォッチ選択中：シールドプレイヤーは選択不可 */
    .watch-shielded {
      cursor: not-allowed;
      position: relative;
    }

    /* Kウォッチ全般のスタイル（背景暗転・フォーカス） */
    .k-watch-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75); /* 選択時：やや暗め */
      z-index: 180;
      pointer-events: none;
      transition: background 0.6s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .k-watch-overlay.viewing {
      background: rgba(0, 0, 0, 0.95); /* 監視時：さらに暗く（ほぼ真っ暗） */
    }
    
    .k-watch-select-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 2.5rem;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.5);
      animation: pulse-opacity 2s infinite alternate;
      z-index: 10000;
      pointer-events: none;
    }
    @keyframes pulse-opacity {
      0% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    .k-watch-active .player-pos {
      z-index: 10 !important;
    }
    .k-watch-active .player-pos.k-watch-focus {
      z-index: 200 !important;
      cursor: pointer;
    }
    .k-watch-active .player-pos.k-watch-focus .player-area {
      animation: watch-focus-aura 1.5s infinite alternate;
    }
    @keyframes watch-focus-aura {
      0% { filter: drop-shadow(0 0 10px #ffcc00); }
      100% { filter: drop-shadow(0 0 35px #ff9900) brightness(1.2); }
    }

    .k-watch-active.k-watch-viewing .player-pos.k-watch-target {
      z-index: 5000 !important;
      top: var(--target-top, 50%) !important;
      left: 50% !important;
      right: auto !important;
      bottom: auto !important;
      transform: translate(-50%, -50%) scale(var(--target-scale, 1.3)) rotate(0deg) !important;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4)) !important;
    }
    .k-watch-active .player-pos.k-watch-selected {
      z-index: 200 !important;
    }
    .k-watch-active .player-pos.k-watch-selected .player-area {
      filter: drop-shadow(0 0 20px #ffcc00) brightness(1.2);
    }
    .k-watch-active.k-watch-viewing .player-pos.k-watch-target .player-center-info {
      transform: translateX(-50%) rotate(0deg) !important;
      top: -160px !important;
      left: 50% !important;
      bottom: auto !important;
      right: auto !important;
    }

    /* ゲージアニメーション */
    .watch-gauge-container {
      position: absolute;
      bottom: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 12px;
      background: rgba(0,0,0,0.8);
      border: 2px solid #ffcc00;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
    }
    .watch-gauge-bar {
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #ffaa00);
      width: 100%;
      animation: watch-gauge-deplete linear forwards;
    }
    @keyframes watch-gauge-deplete {
      0% { width: 100%; }
      100% { width: 0%; }
    }

    /* K-Watch Overlay Premium Design */
    .watch-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px; /* 少しスリムに */
      padding: 12px;
      background: rgba(10, 10, 10, 0.98);
      border: 2px solid var(--color-gold);
      box-shadow: 0 0 30px rgba(0, 0, 0, 1);
      border-radius: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #fff;
      will-change: transform, opacity;
      transform: translateX(-50%) rotate(180deg);
      transform-origin: center center;
    }

    @media (max-width: 768px) {
      .watch-overlay {
        width: 70vw !important; /* スマホではさらにスリムに */
        padding: 10px !important;
      }
    }

    .watch-header {
      text-align: center;
    }

    .watch-header h3 {
      color: var(--color-gold);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .watch-timer {
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      background: #000;
      padding: 5px 15px;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .watch-hand {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    .watch-hand .card {
      width: 70px;
      height: 100px;
      font-size: 0.8rem;
    }

    @keyframes bounce {
      from {
        transform: translateX(-50%) translateY(0);
      }

      to {
        transform: translateX(-50%) translateY(-5px);
      }
    }

    @keyframes pulse-jback-bg {
      from {
        background: rgba(230, 126, 34, 0.05);
      }

      to {
        background: rgba(230, 126, 34, 0.25);
      }
    }

    /* --- テーブルのレイアウト --- */
    .table-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url('game_bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .player-pos {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      z-index: 50;
      transform-style: preserve-3d;
      overflow: visible !important;
    }

    .card-rank {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 28px;
      font-weight: 900;
      font-family: 'Cinzel', serif;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
      z-index: 20;
      pointer-events: none;
      -webkit-text-stroke: 1px rgba(0, 0, 0, 0.5);
    }

    .tcg-art {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 4px;
      z-index: 5;
      background-size: cover;
      background-position: center;
    }

    .pos-top {
      top: 150px;
      left: 50%;
      transform: translateX(-50%) rotate(180deg) scale(0.85);
    }

    .pos-left {
      left: 270px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg) scale(0.85);
      transform-origin: center;
    }

    .pos-right {
      left: auto;
      right: 270px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg) scale(0.85);
      transform-origin: center;
    }

    .pos-top .card,
    .pos-left .card,
    .pos-right .card {
      top: 0;
    }

    .pos-bottom {
      bottom: -35px;
      left: 50%;
      width: 100%;
      height: 180px;
      transform: translateX(-50%) scale(1.15);
      z-index: 300 !important;
    }

    .player-pos.pos-bottom .card {
      bottom: 0;
    }

    /* --- 現在のターンの禍々しいハイライト --- */
    .player-pos.active-turn {
      z-index: 60;
    }

    .player-pos.active-turn .player-status {
      color: #fff;
      text-shadow: 0 0 15px var(--color-blood), 0 0 30px var(--color-blood);
      box-shadow: 0 0 30px inset var(--color-blood), 0 0 25px var(--color-blood);
      border: 2px solid var(--color-blood);
      transform: translateX(-50%) scale(1.25);
      animation: pulse-blood 1.2s infinite alternate;
      z-index: 110;
    }

    /* プレイヤーの床に赤い影（サークル）を表示 */
    .player-pos.active-turn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 120px;
      transform: translate(-50%, -10%);
      /* 足元に広がるように調整 */
      background: radial-gradient(ellipse at center, rgba(138, 3, 3, 0.6) 0%, rgba(138, 3, 3, 0.2) 50%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10;
      animation: pulse-blood-floor 1.5s infinite alternate;
    }

    @keyframes pulse-blood-floor {
      0% {
        opacity: 0.6;
        transform: translate(-50%, -10%) scale(0.9);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -10%) scale(1.1);
      }
    }

    /* --- アクションパネル（中央下・横並びへ） --- */
    .action-panel {
      position: absolute;
      left: 50%;
      bottom: 15px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 20px;
      z-index: 400 !important;
      align-items: center;
      justify-content: center;
      width: auto;
    }

    .action-btn {
      width: 200px;
      padding: 12px 0;
    }

    @keyframes pulse-blood {
      0% {
        box-shadow: 0 0 15px inset rgba(138, 3, 3, 0.5), 0 0 10px rgba(138, 3, 3, 0.3);
      }

      100% {
        box-shadow: 0 0 40px inset rgba(138, 3, 3, 0.9), 0 0 25px rgba(138, 3, 3, 0.8);
      }
    }

    /* デスゲーム風 階級章 */
    .rank-badge {
      display: block;
      font-size: 12px;
      font-family: 'Cinzel', serif;
      color: var(--color-gold);
      text-shadow: 0 0 5px rgba(184, 134, 11, 0.5);
      margin-top: 2px;
    }

    .rank-daifugo {
      color: #f1c40f;
    }

    .rank-daihinmin {
      color: #555;
      text-decoration: line-through;
    }

    /* --- TCG Dark Fantasy Card Design --- */
    :root {
      --card-width: 95px;
      --card-height: 135px;
    }

    .card {
      width: var(--card-width);
      height: var(--card-height);
      /* Base container is dark with gold/bronze metallic trim */
      background: #0d0b0a;
      border: 3px solid #b38b4d;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      /* シャドウを軽量化 */
      position: absolute;
      display: flex;
      flex-direction: column;
      user-select: none;
      /* パフォーマンス向上のため will-change を追加 */
      will-change: transform, left, top, opacity;
      transition: transform 0.2s, box-shadow 0.2s, top 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), margin-left 0.8s ease-out;
      backface-visibility: hidden;
      transform-origin: bottom center;
      overflow: visible;
      /* ツールチップ表示のため */
    }

    /* ツールチップ（ホバー時のカード能力説明）: カード上部の半透明黒テキストボックス */
    .card .tcg-tooltip {
      position: absolute;
      bottom: 110%;
      /* カードの上部 */
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 6px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.2;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateY(10px);
      z-index: 2000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
      font-family: var(--font-main);
      box-sizing: border-box;
      border: 1px solid rgba(184, 134, 11, 0.4);
    }

    .card:hover .tcg-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    /* 以前の黒い四角（::after）を完全に削除 */
    .card[data-tooltip]::after,
    .card::after {
      display: none !important;
    }

    /* Outer border metallic shine effect */
    .card::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 2px solid rgba(255, 223, 145, 0.2);
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
    }

    /* ゲーム終了・リザルトUI */
    .game-over-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 450px;
      padding: 40px;
      background: rgba(10, 5, 2, 0.95);
      border: 4px double var(--color-gold);
      box-shadow: 0 0 50px rgba(0, 0, 0, 1), 0 0 30px rgba(184, 134, 11, 0.2);
      border-radius: 8px;
      z-index: 5000;
      text-align: center;
      color: #eadbb1;
      animation: message-zoom 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid transparent;
      font-family: 'Cinzel', serif;
    }

    .result-row.highlight-p0 {
      background: rgba(184, 134, 11, 0.15);
      border-left-color: var(--color-gold);
      box-shadow: inset 0 0 10px rgba(184, 134, 11, 0.1);
    }

    .rank-num {
      font-size: 1.2rem;
      color: #888;
    }

    .rank-title {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .rank-player {
      font-size: 1rem;
      color: #aaa;
    }

    .result-actions {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .gold-btn {
      padding: 15px;
      background: linear-gradient(to bottom, #4a3a1a, #2a1a0a);
      border: 1px solid var(--color-gold);
      color: var(--color-gold);
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    .gold-btn:hover {
      background: var(--color-gold);
      color: #000;
      box-shadow: 0 0 20px rgba(184, 134, 11, 0.5);
    }

    /* 階級ラベル */
    .player-rank-label {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 15px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #444;
      color: #ccc;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      white-space: nowrap;
      border-radius: 4px;
      z-index: 100;
    }

    .player-rank-label.rank-daifugo {
      color: var(--color-gold);
      border-color: var(--color-gold);
      box-shadow: 0 0 10px rgba(184, 134, 11, 0.4);
    }

    .player-rank-label.rank-daihinmin {
      color: #888;
      border-color: #333;
    }

    /* 交換UI */
    .exchange-overlay-ui {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 30px;
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid var(--color-gold);
      border-radius: 8px;
      z-index: 10000;
      text-align: center;
      width: 400px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 1);
    }

    /* Multiplayer Lobby Styles */
    .passphrase-input {
      background: #000;
      color: #fff;
      border: 1px solid var(--color-gold);
      padding: 12px;
      width: 260px;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
      outline: none;
      box-shadow: inset 0 0 10px rgba(184, 134, 11, 0.2);
    }
    .passphrase-input:focus {
      box-shadow: inset 0 0 15px rgba(184, 134, 11, 0.5), 0 0 10px rgba(184, 134, 11, 0.3);
    }
    .player-lobby-list div {
      transition: all 0.3s;
    }
    .player-lobby-list div:hover {
      background: rgba(184, 134, 11, 0.2) !important;
      transform: translateX(5px);
    }

    /* Inner art canvas */
    .tcg-art {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
      background-image: radial-gradient(circle at center, #2e1515, #000);
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card:hover .tcg-art {
      transform: scale(1.1);
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.8) 0%, transparent 40%, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Rank & Icon Circle */
    .tcg-rank-circle {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.85);
      /* backdrop-filter削除の代わりに不透明度アップ */
      border: 1.5px solid #b38b4d;
      border-radius: 4px;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      font-size: 16px;
      text-shadow: 0 0 5px rgba(0, 0, 0, 1);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .tcg-rank-circle span {
      margin: 0;
    }

    /* フィールド中央のステータス表示 (Jバック/革命) */
    .field-status-label {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-family: 'Cinzel', serif;
      color: #ff4444;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.7);
      padding: 2px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255, 0, 0, 0.5);
      white-space: nowrap;
      z-index: 100;
      animation: fadeIn 0.3s ease-out;
    }

    /* デスクトップ用退場ボタンの位置調整 (ターン表示UI left:40px, top:30px と揃える) */
    .btn-exit-to-title {
      position: absolute;
      top: 135px;
      left: 40px;
      z-index: 10000;
    }

    @media (max-width: 768px) {
      .action-panel {
        bottom: 10px !important;
      }
      .field-status-label {
        font-size: 10px;
        top: -15px;
        padding: 1px 8px;
      }
      .to-graveyard {
        width: 60px !important;
        height: 85px !important;
      }
      .player-pos.pos-bottom .card {
        width: 85px !important;
        height: 120px !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.8) !important; /* 軽量化 */
        bottom: 0 !important;
      }
      .turn-info-plaque {
        top: 15px !important;
        left: 15px !important;
        padding: 8px 16px !important;
      }
      .btn-exit-to-title {
        position: fixed;
        top: 75px !important; /* モバイル版位置調整 */
        left: 15px !important; /* ターン表示左端と揃える */
        z-index: 10000;
        background: rgba(60, 0, 0, 0.9);
        color: #fff;
        border: 1px solid #a00;
        padding: 3px 8px; /* サイズ縮小 */
        font-family: 'Cinzel', serif;
        font-size: 11px; /* サイズ縮小 */
        font-weight: bold;
        letter-spacing: 1px;
        border-radius: 4px;
        cursor: pointer;
      }
      .card.on-table {
        width: 125px !important; /* さらに巨大化 */
        height: 175px !important; /* さらに巨大化 */
      }
      .on-table .tcg-name {
        font-size: 18px !important;
        height: 24px !important;
        bottom: 12px !important;
        color: var(--color-gold) !important;
        font-weight: bold !important;
      }
      .cutin-card-popup .cutin-card-text .cutin-card-name {
        font-size: 32px !important; /* 最大級 */
        color: var(--color-gold) !important;
        font-weight: 900 !important;
      }
      .cutin-card-desc {
        font-size: 22px !important; /* 最大級 */
        color: #fff !important; /* 白を強制 */
        font-weight: bold !important;
      }
      .field-status-label {
        font-size: 1.4rem !important; /* 縮小 */
        padding: 4px 12px !important;
      }
      .message-overlay {
        display: block !important;
        font-size: 52px !important; /* 拡大 */
        width: 100vw !important;
        top: 40% !important;
        -webkit-text-stroke: 0 !important; /* ふち消去 */
      }
      .message-overlay p {
        font-size: 24px !important; /* 拡大 */
        color: #fff !important;
        margin-top: 10px !important;
        -webkit-text-stroke: 0 !important;
      }
      .effect-4-shield {
        width: 90vw !important; /* 少し幅を狭める */
        height: 46vh !important;
        border: 15px double rgba(0, 180, 216, 0.7) !important;
        border-radius: 12px !important;
        background: rgba(0, 180, 216, 0.05) !important;
        box-shadow: 0 0 40px #00b4d8 !important;
      }
    }

    /* Name Plate */
    .tcg-name {
      position: absolute;
      bottom: 5px;
      left: 5px;
      right: 5px;
      height: 20px;
      z-index: 10;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 0, 0, 1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }





    /* Cut-in overlay – Card Center Popup (背景そのまま・中央カードポップアップ) */
    .cutin-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      overflow: hidden;
      /* 背景はそのまま – 暗転なし */
    }

    /* カード全体のラッパー（中央に大きく浮かぶ） */
    .cutin-card-popup {
      position: relative;
      width: min(340px, 55vw);
      height: min(500px, 80vh);
      border-radius: 12px;
      transform: scale(0) rotate(-8deg);
      opacity: 0;
      animation: card-popup-in 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.05s forwards;
      z-index: 10;
      /* 属性色アウターグロウ */
      box-shadow:
        0 0 0 3px var(--aura, #b8860b),
        0 0 40px var(--aura, #b8860b),
        0 0 80px var(--aura-dim, rgba(184, 134, 11, 0.5)),
        0 30px 60px rgba(0, 0, 0, 0.9);
    }

    @keyframes card-popup-in {
      0% {
        transform: scale(0) rotate(-8deg);
        opacity: 0;
      }

      70% {
        transform: scale(1.08) rotate(2deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* カード内キャラクター画像エリア */
    .cutin-card-art {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 10px;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      /* 下側テキストエリアのグラデーション */
    }

    /* カード内グラデーションオーバーレイ */
    .cutin-card-art::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(0deg,
          rgba(0, 0, 0, 0.92) 0%,
          rgba(0, 0, 0, 0.4) 35%,
          transparent 65%,
          rgba(0, 0, 0, 0.2) 100%);
    }

    /* ランクサークル（カード左上） */
    .cutin-card-rank {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid var(--aura, #b8860b);
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      text-shadow: 0 0 8px var(--aura, #b8860b);
      box-shadow: 0 0 12px var(--aura, #b8860b);
      z-index: 5;
    }

    /* カード内テキストエリア */
    .cutin-card-text {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 14px 20px;
      z-index: 5;
    }

    .cutin-card-name {
      font-family: 'Cinzel', serif;
      font-size: 3.2rem; /* 最大級に拡大 */
      font-weight: 900;
      font-style: italic;
      letter-spacing: 4px;
      color: var(--aura, #b8860b);
      text-shadow: 0 0 35px var(--aura, #b8860b), 0 6px 15px rgba(0, 0, 0, 1);
      margin: 0 0 15px 0;
      animation: cutin-text-slide 0.5s 0.3s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .cutin-card-desc {
      font-family: var(--font-main);
      font-size: 2.2rem; /* 最大級に拡大 */
      font-style: italic;
      color: #fff !important; /* 白に変更 */
      font-weight: bold;
      text-shadow: 0 2px 15px rgba(0, 0, 0, 1);
      margin: 0;
      animation: cutin-desc-fade 0.4s 0.5s forwards;
      opacity: 0;
    }

    @keyframes cutin-text-slide {
      0% {
        transform: translateY(15px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes cutin-desc-fade {
      to {
        opacity: 0.92;
      }
    }

    /* カード横を走るスラッシュ（上下） */
    .cutin-slash-top {
      position: absolute;
      top: 50%;
      left: -100%;
      width: 300%;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, white 40%, var(--aura, #b8860b) 60%, transparent 100%);
      transform: translateY(-160px) rotate(-6deg);
      opacity: 0;
      z-index: 8;
      animation: slash-sweep-top 0.4s 0.2s ease-out forwards;
      box-shadow: 0 0 10px var(--aura, #b8860b);
    }

    @keyframes slash-sweep-top {
      0% {
        left: -100%;
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      100% {
        left: 100%;
        opacity: 0;
      }
    }

    .cutin-slash-bottom {
      position: absolute;
      top: 50%;
      left: 100%;
      width: 300%;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--aura, #b8860b) 40%, white 60%, transparent 100%);
      transform: translateY(160px) rotate(-6deg);
      opacity: 0;
      z-index: 8;
      animation: slash-sweep-bottom 0.4s 0.3s ease-out forwards;
      box-shadow: 0 0 10px var(--aura, #b8860b);
    }

    @keyframes slash-sweep-bottom {
      0% {
        left: 100%;
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      100% {
        left: -100%;
        opacity: 0;
      }
    }

    /* 属性色パルスリング */
    .cutin-pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 2px solid var(--aura, #b8860b);
      box-shadow: 0 0 20px var(--aura, #b8860b);
      transform: translate(-50%, -50%) scale(0);
      opacity: 1;
      animation: pulse-ring-expand 0.9s 0.1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
      pointer-events: none;
      z-index: 1;
    }

    .cutin-pulse-ring:nth-child(2) {
      animation-delay: 0.3s;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: none;
    }

    @keyframes pulse-ring-expand {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }

      80% {
        opacity: 0.5;
      }

      100% {
        transform: translate(-50%, -50%) scale(4);
        opacity: 0;
      }
    }

    /* =========================================
       個別キャラクター発動エフェクト用クラス群
       ========================================= */

    /* A: 青い閃光スラッシュ */
    .effect-a-slash {
      position: absolute;
      top: 50%;
      left: -50%;
      width: 200%;
      height: 8px;
      background: linear-gradient(90deg, transparent, #2980b9, #ffffff, #2980b9, transparent);
      transform: translateY(-50%) rotate(-15deg);
      box-shadow: 0 0 30px #2980b9, 0 0 60px #ffffff;
      opacity: 0;
      z-index: 15;
      animation: a-slash-strike 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }

    @keyframes a-slash-strike {
      0% {
        left: -50%;
        opacity: 0;
        transform: translateY(-50%) rotate(-15deg) scaleY(0.1);
      }

      50% {
        opacity: 1;
        transform: translateY(-50%) rotate(-15deg) scaleY(1.5);
      }

      100% {
        left: 50%;
        opacity: 0;
        transform: translateY(-50%) rotate(-15deg) scaleY(0.1);
      }
    }

    /* 2: 緑の地割れ・揺れ */
    .effect-2-quake {
      position: absolute;
      bottom: -10vh;
      left: 0;
      width: 100vw;
      height: 30vh;
      background: radial-gradient(ellipse at bottom, rgba(39, 174, 96, 0.6) 0%, transparent 70%);
      border-top: 4px solid #27ae60;
      box-shadow: 0 -10px 40px #27ae60;
      opacity: 0;
      z-index: 2;
      animation: quake-shock 0.6s ease-out forwards;
    }

    @keyframes quake-shock {
      0% {
        transform: translateY(100%);
        opacity: 0;
      }

      20% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(20%);
        opacity: 0;
      }
    }

    @keyframes screen-shake {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translate(-10px, 10px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translate(10px, -10px);
      }
    }

    /* 3: グレーの土煙 */
    .effect-3-dust {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at bottom, rgba(127, 140, 141, 0.8) 0%, transparent 60%);
      opacity: 0;
      z-index: 4;
      animation: dust-rise 1s ease-out forwards;
    }

    @keyframes dust-rise {
      0% {
        opacity: 0;
        transform: translateY(200px) scale(0.8);
      }

      40% {
        opacity: 1;
        transform: translateY(0) scale(1.1);
        filter: blur(5px);
      }

      100% {
        opacity: 0;
        transform: translateY(-100px) scale(1.5);
        filter: blur(15px);
      }
    }

    /* 4: 水色の防壁 (回転させず静的な青い壁に) */
    /* 4: 水色の防壁 (回転させず静的な青い壁に) */
    .effect-4-shield {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85vw; /* 拡大：70 -> 85 */
      height: 85vh;
      border: 8px solid rgba(0, 180, 216, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 60px #00b4d8, inset 0 0 60px #00b4d8;
      background: rgba(0, 180, 216, 0.15);
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 15;
      animation: shield-deploy 0.4s ease-out forwards;
    }

    @keyframes shield-deploy {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.1);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* 5: ターコイズの鎖 */
    .effect-5-chain {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 20px;
      background: repeating-linear-gradient(90deg, #e74c3c, #e74c3c 10px, transparent 10px, transparent 20px);
      box-shadow: 0 0 15px #e74c3c;
      transform: translateY(-50%) rotate(25deg);
      opacity: 0;
      z-index: 15;
      animation: chain-bind 0.4s ease-out forwards;
    }

    @keyframes chain-bind {
      0% {
        left: -100%;
        opacity: 0;
      }

      100% {
        left: 0;
        opacity: 0.8;
      }
    }

    /* 6: 赤紫の炎 (Phoenix) */
    .effect-6-fire {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 300px;
      height: 400px;
      background: radial-gradient(ellipse at bottom, #8e44ad 0%, #e67e22 50%, transparent 100%);
      transform: translateX(-50%) scale(0);
      transform-origin: bottom center;
      opacity: 0;
      z-index: 5;
      filter: blur(8px);
      animation: fire-burst 0.8s ease-out forwards;
    }

    @keyframes fire-burst {
      0% {
        transform: translateX(-50%) scale(0.2);
        opacity: 0;
      }

      50% {
        transform: translateX(-50%) scale(1.5);
        opacity: 0.9;
      }

      100% {
        transform: translateX(-50%) scale(2);
        opacity: 0;
      }
    }

    /* 7: 黄金の煙 */
    .effect-7-gold {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
      opacity: 0;
      z-index: 5;
      animation: gold-smoke 1s ease-out forwards;
    }

    @keyframes gold-smoke {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        transform: scale(1.8);
      }
    }

    /* 8: 斬撃エフェクト (強制暗転を廃止し、オレンジの斧跡だけを残す) */
    .effect-8-cut {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100vw;
      height: 12px;
      background: #d35400;
      /* オレンジの斧 */
      box-shadow: 0 0 40px #d35400, 0 0 20px #ffffff;
      opacity: 0;
      z-index: 9999;
      transform: translateY(-50%) rotate(-5deg);
      /* 斜めの斬撃 */
      animation: cut-screen 0.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }

    @keyframes cut-screen {
      0% {
        width: 0;
        left: 50%;
        opacity: 1;
      }

      30% {
        width: 120vw;
        left: -10vw;
        opacity: 1;
        height: 20px;
      }

      100% {
        width: 120vw;
        left: -10vw;
        opacity: 0;
        height: 2px;
        transform: translateY(-50%) rotate(-5deg) scaleY(0);
      }
    }

    /* 9: マゼンタの歯車 */
    .effect-9-gear {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150vw;
      height: 150vw;
      border: 40px dashed #f1c40f;
      border-radius: 50%;
      opacity: 0;
      z-index: 2;
      animation: gear-spin 1s linear forwards;
    }

    @keyframes gear-spin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 0.3;
      }

      100% {
        transform: translate(-50%, -50%) rotate(-180deg);
        opacity: 0;
      }
    }

    /* 10: 黒い雨 */
    .effect-10-rain {
      position: absolute;
      top: -20vh;
      left: 0;
      width: 100vw;
      height: 120vh;
      background: linear-gradient(180deg, transparent, rgba(44, 62, 80, 0.8));
      opacity: 0;
      z-index: 15;
      animation: rain-fall 0.8s ease-in forwards;
    }

    @keyframes rain-fall {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      100% {
        transform: translateY(0);
        opacity: 0;
      }
    }

    /* J: オレンジの全体オーラ演出 */
    .effect-j-reverse {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 50%, rgba(230, 126, 34, 0.4) 0%, transparent 70%),
        repeating-radial-gradient(circle at center, rgba(230, 126, 34, 0.1) 0, rgba(211, 84, 0, 0.1) 50px, transparent 100px);
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 5;
      /* 手札や盤面の下に敷く */
      pointer-events: none;
      animation: reverse-aura 3s ease-in-out infinite alternate;
    }

    @keyframes reverse-aura {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }

      50% {
        opacity: 0.8;
        transform: scale(1.1);
      }

      100% {
        opacity: 0;
        transform: scale(1);
      }
    }

    /* Q: シルバーと赤の爆炎 */
    .effect-q-bomb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #ffffff 0%, #ff4757 40%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 15;
      border-radius: 50%;
      animation: explosion-burst 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    }

    @keyframes explosion-burst {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }

      50% {
        transform: translate(-50%, -50%) scale(5);
        opacity: 1;
        filter: brightness(2);
      }

      100% {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0;
      }
    }

    /* K: ゴールド魔法陣 */
    .effect-k-magic {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90vmin;
      height: 90vmin;
      border: 5px solid #f1c40f;
      border-radius: 50%;
      box-shadow: 0 0 40px #f1c40f, inset 0 0 40px #f1c40f;
      transform: translate(-50%, -50%) rotate(0deg) scale(0);
      opacity: 0;
      z-index: 4;
      animation: magic-circle-deploy 1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }

    @keyframes magic-circle-deploy {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) scale(0);
        opacity: 0;
      }

      50% {
        opacity: 0.8;
      }

      100% {
        transform: translate(-50%, -50%) rotate(90deg) scale(1.2);
        opacity: 0.4;
      }
    }

    /* Joker: 多色オーブ・ピンク霧 */
    .effect-joker-mist {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, rgba(253, 121, 168, 0.7) 0%, transparent 80%);
      opacity: 0;
      z-index: 15;
      animation: joker-mist-spread 1.2s ease-out forwards;
      filter: blur(10px);
    }

    @keyframes joker-mist-spread {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.2);
      }
    }

    /* 旧スタイル（互換のため残す） */
    @keyframes text-pulse {
      from {
        transform: scale(1);
        text-shadow: 0 0 20px var(--color-blood);
      }

      to {
        transform: scale(1.05);
        text-shadow: 0 0 50px var(--color-blood), 0 0 10px #fff;
      }
    }

    @keyframes cutin-show {
      to {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* ===== プラス5 コンボ カットイン ===== */
    .plus5-combo-cutin {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* 全カードを絶対位置で中央に配置（各フェーズでtransformで動かす） */
    .p5c-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(340px, 55vw);
      height: min(500px, 80vh);
      border-radius: 12px;
      background-size: cover;
      background-position: center top;
      box-shadow:
        0 0 0 3px var(--card-aura, #b8860b),
        0 0 40px var(--card-aura, #b8860b),
        0 20px 50px rgba(0,0,0,0.9);
    }

    .p5c-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(0deg,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.4) 35%,
        transparent 65%,
        rgba(0,0,0,0.2) 100%);
    }

    .p5c-card-rank {
      position: absolute;
      top: 10px; left: 10px;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.85);
      border: 2px solid var(--card-aura, #b8860b);
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      text-shadow: 0 0 8px var(--card-aura, #b8860b);
      z-index: 5;
    }

    .p5c-card-text {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 16px 14px 20px;
      z-index: 5;
    }

    .p5c-card-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 3.2rem);
      font-weight: 900;
      font-style: italic;
      letter-spacing: 4px;
      color: var(--card-aura, #b8860b);
      text-shadow: 0 0 35px var(--card-aura, #b8860b), 0 6px 15px rgba(0,0,0,1);
      margin: 0 0 10px 0;
      animation: cutin-text-slide 0.5s 0.3s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .p5c-card-desc {
      font-family: var(--font-main);
      font-size: clamp(0.9rem, 2.5vw, 2.2rem);
      font-style: italic;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 2px 15px rgba(0,0,0,1);
      margin: 0;
      animation: cutin-desc-fade 0.4s 0.5s forwards;
      opacity: 0;
    }

    /* ---- Phase 1: +5 カット中央に単独表示 ---- */
    .p5c-phase1 .p5c-card-5 {
      animation: p5c-enter-center 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    .p5c-phase1 .p5c-card-other { opacity: 0; }
    .p5c-phase1 .p5c-card-result { display: none; }

    @keyframes p5c-enter-center {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      70%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    /* ---- Phase 2: +5 が左へ・追加カードが右へ → 両方同サイズで左右対称配置 ---- */
    .p5c-phase2 .p5c-card-5 {
      animation: p5c-card5-to-left-sym 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .p5c-phase2 .p5c-card-other {
      animation: p5c-other-to-right-sym 0.55s 0.2s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    .p5c-phase2 .p5c-card-result { display: none; }

    /* 中央 → 左へスライド */
    @keyframes p5c-card5-to-left-sym {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% - min(210px, 32vw)), -50%) scale(1); opacity: 1; }
    }

    /* 右から登場して右の定位置へ */
    @keyframes p5c-other-to-right-sym {
      0%   { transform: translate(calc(-50% + 400px), -50%) scale(0) rotate(8deg); opacity: 0; }
      70%  { transform: translate(calc(-50% + min(215px, 33vw)), -50%) scale(1.05) rotate(-1deg); opacity: 1; }
      100% { transform: translate(calc(-50% + min(210px, 32vw)), -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    /* ---- Phase 3: 両カードが中央に向かって合体・赤い爆発 ---- */
    .p5c-phase3 .p5c-card-5 {
      animation: p5c-card5-merge-from-left 0.7s cubic-bezier(0.4, 0, 0.6, 1) forwards;
    }
    .p5c-phase3 .p5c-card-other {
      animation: p5c-other-merge-from-right 0.7s cubic-bezier(0.4, 0, 0.6, 1) forwards;
    }
    .p5c-phase3 .p5c-card-result { display: none; }

    /* 左の定位置 → 中央へ縮んで消える */
    @keyframes p5c-card5-merge-from-left {
      0%   { transform: translate(calc(-50% - min(210px, 32vw)), -50%) scale(1); opacity: 1; }
      60%  { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    }

    /* 右の定位置 → 中央へ縮んで消える */
    @keyframes p5c-other-merge-from-right {
      0%   { transform: translate(calc(-50% + min(210px, 32vw)), -50%) scale(1); opacity: 1; }
      60%  { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    }

    /* 赤い爆発フラッシュ */
    .p5c-merge-flash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,160,0,1) 0%, rgba(220,0,0,0.85) 35%, transparent 70%);
      pointer-events: none;
      z-index: 30;
      opacity: 0;
    }

    .p5c-phase3 .p5c-merge-flash {
      animation: p5c-flash-burst 0.8s 0.3s cubic-bezier(0.2,0.8,0.3,1) forwards;
    }

    @keyframes p5c-flash-burst {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20%  { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
    }

    /* ---- Phase 4: 結果カードが中央に出現 ---- */
    .p5c-phase4 .p5c-card-5  { display: none; }
    .p5c-phase4 .p5c-card-other { display: none; }
    .p5c-phase4 .p5c-card-result {
      animation: p5c-enter-center 0.55s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

      content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="50" height="50"><path fill="%23333" d="M50,15 C35,15 25,30 25,45 C25,55 30,65 35,70 L35,85 L65,85 L65,70 C70,65 75,55 75,45 C75,30 65,15 50,15 Z M40,45 A5,5 0 1,1 40,55 A5,5 0 1,1 40,45 M60,45 A5,5 0 1,1 60,55 A5,5 0 1,1 60,45 M50,65 L45,75 L55,75 Z"/><line x1="10" y1="90" x2="90" y2="10" stroke="%23333" stroke-width="4"/><line x1="90" y1="90" x2="10" y2="10" stroke="%23333" stroke-width="4"/></svg>');
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }

    /* --- ステータス・UI --- */
    /* プレイヤー名の配置（YOUは廃止・非表示） */
    .player-status {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 10, 5, 0.92);
      padding: 6px 16px;
      border: 1px solid #d4af37; /* ゴールド */
      border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 14px;
      color: #ebd3ad;
      letter-spacing: 1px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8), inset 0 0 6px rgba(212, 175, 55, 0.3);
      text-transform: uppercase;
    }

    /* アバター・ステータス・手札枚数の新配置定義 */

    /* 手札中央の情報配置用のコンテナ */
    .player-center-info {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      z-index: 1000;
      pointer-events: none;
    }

    /* CPUの向き調整とオフセット設定 */
    .pos-top .player-center-info {
      left: 50% !important;       /* 手札の中央軸を維持 */
      top: 75px !important;       /* 少し下部（手札側）へ下げる */
      transform: translate(-50%, -50%) rotate(180deg) !important;
    }
    .pos-left .player-center-info {
      left: 50% !important;       /* 手札の中央軸を維持 */
      top: 85px !important;       /* 少し内側（手札側）へ戻す */
      transform: translate(-50%, -50%) rotate(-90deg) !important;
    }
    .pos-right .player-center-info {
      left: 50% !important;       /* 手札の中央軸を維持 */
      top: 85px !important;       /* 少し内側（手札側）へ戻す */
      transform: translate(-50%, -50%) rotate(90deg) !important;
    }

    /* CPUの各パーツ配置を static にしてフレックスボックスに従わせる */
    .player-center-info .player-avatar-icon {
      position: static !important;
      transform: none !important;
      margin: 0 !important;
    }
    .player-center-info .player-status {
      position: static !important;
      transform: none !important;
      margin: 0 !important;
      white-space: nowrap !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.85) !important;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }
    .player-center-info .hand-count-badge {
      position: static !important;
      transform: none !important;
      margin: 0 !important;
    }

    /* 自身の固定アバター・名前（画面左下） */
    .player-you-info-fixed {
      position: fixed;
      left: 25px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 1005;
      pointer-events: auto;
    }
    .player-you-info-fixed .player-avatar-icon {
      position: static !important;
      width: 75px !important;
      height: 75px !important;
      transform: none !important;
      display: block !important;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 5px 10px rgba(0,0,0,0.8) !important;
    }
    .player-you-info-fixed .player-status {
      position: static !important;
      width: auto !important;
      min-width: 90px;
      font-size: 13px !important;
      text-align: center !important;
      transform: none !important;
      display: block !important;
      padding: 4px 10px !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.8) !important;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #ebd3ad;
      letter-spacing: 1px;
    }

    /* 自身の左下固定アバター内の手札枚数の配置スタイル */
    .player-you-info-fixed .hand-count-badge {
      position: static !important;
      transform: none !important;
      margin: 0 !important;
    }

    /* 手札枚数バッジ */
    .hand-count-badge {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 10, 5, 0.95);
      border: 1.5px solid #d4af37; /* ゴールド */
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: bold;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      box-shadow: 0 0 10px rgba(0,0,0,0.8), 0 0 5px #d4af37;
    }



    /* アクションパネルの位置を下げて手札と被らないように調整 */
    .action-panel {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 400 !important;
    }




    /* 能力発動ログ表示 -> 廃止 */
    .ability-log-overlay {
      display: none !important;
    }
    @keyframes log-fade-in {
      0% { opacity: 0; transform: translate(-50%, -40%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* --- 選択モードUI --- */
    /* --- 強化された演出アニメーション --- */
    @keyframes card-explode {
      0% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.8);
        filter: brightness(3) sepia(1) hue-rotate(-50deg);
        opacity: 1;
      }

      100% {
        transform: scale(2);
        filter: brightness(0);
        opacity: 0;
      }
    }

    .exploding-card {
      animation: card-explode 0.8s forwards ease-out;
      z-index: 500;
    }

    .player-pos.pos-bottom .card.selectable {
      /* 自分のカードをさらに強調 */
      width: calc(var(--card-width) * 1.15);
      height: calc(var(--card-height) * 1.15);
    }

    @keyframes card-fly-back {
      0% {
        top: var(--start-top);
        left: var(--start-left);
        transform: translate(-50%, -50%) scale(var(--start-scale, 1)) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        top: var(--end-top);
        left: var(--end-left);
        transform: translate(-50%, -50%) scale(var(--end-scale, 1)) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes shield-repel-fly {
      0% {
        top: var(--start-top);
        left: var(--start-left);
        transform: translate(-50%, -50%) scale(var(--start-scale, 1)) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      45% {
        top: var(--end-top);
        left: var(--end-left);
        transform: translate(-50%, -50%) scale(var(--end-scale, 1)) rotate(180deg);
        opacity: 1;
      }
      55% {
        top: var(--end-top);
        left: var(--end-left);
        transform: translate(-50%, -50%) scale(var(--end-scale, 1.2)) rotate(180deg);
        filter: drop-shadow(0 0 15px #44aaff);
        opacity: 1;
      }
      85% {
        top: var(--start-top);
        left: var(--start-left);
        transform: translate(-50%, -50%) scale(var(--start-scale, 1)) rotate(360deg);
        filter: none;
        opacity: 1;
      }
      100% {
        top: var(--start-top);
        left: var(--start-left);
        transform: translate(-50%, -50%) scale(var(--start-scale, 1)) rotate(360deg);
        opacity: 0;
      }
    }

    /* 配牌アニメーション：中央から各プレイヤーの手元へ */
    @keyframes deal-fly {
      0% {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        /* transform は inline style で上書きされるため、ここでは主に top/left/opacity */
        opacity: 1;
      }
    }

    .card.dealing {
      animation: deal-fly 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
      animation-delay: var(--deal-delay, 0s);
    }

    .deal-card-back::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 2px solid rgba(255, 223, 145, 0.2);
      border-radius: 8px;
    }

    @keyframes received-pulse {
      0% { box-shadow: 0 0 0px #fff; }
      50% { box-shadow: 0 0 30px #fff; transform: translateY(-20px); }
      100% { box-shadow: 0 0 0px #fff; }
    }

    .received-highlight {
      animation: white-light-pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 25px 10px rgba(255, 255, 255, 0.9) !important;
      border-color: #fff !important;
      z-index: 150;
    }

    @keyframes white-light-pulse {
      0% { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.6); }
      50% { box-shadow: 0 0 35px 15px rgba(255, 255, 255, 1); }
      100% { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.6); }
    }

    .selection-overlay-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 24px;
      background: rgba(10, 5, 5, 0.95);
      border-radius: 12px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 1), 0 0 20px rgba(184, 134, 11, 0.1);
      animation: slide-up-centered 0.4s ease-out forwards;
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(280px, 40vw, 420px);
      z-index: 10000;
      max-height: 85vh;
      overflow-y: auto;
    }

    .selection-guide {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: #ffd700;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 1);
      letter-spacing: 1.5px;
      text-align: center;
    }

    .rank-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      /* 3列に変更 */
      gap: 8px;
      width: 100%;
    }

    .rank-select-btn {
      padding: 8px 5px;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rank-select-btn:hover {
      background: var(--color-blood);
      border-color: #fff;
    }


    .btn-confirm {
      background: var(--color-blood);
      color: #fff;
      border: 2px solid #fff;
      font-weight: bold;
      padding: 12px 30px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--color-blood);
    }

    .btn-confirm:disabled {
      background: #333;
      border-color: #666;
      box-shadow: none;
      opacity: 0.5;
    }

    .selection-cancel-hint {
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    @keyframes slide-up-centered {
      from {
        transform: translate(-50%, calc(-50% + 50px)) scale(0.9);
        opacity: 0;
      }

      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    /* --- 特殊効果アニメーション要素 --- */

    /* 6フェニックスで取得したカードの紫色グロー */
    .phoenix-glow {
      box-shadow:
        0 0 8px 3px rgba(160, 0, 255, 0.9),
        0 0 20px 6px rgba(130, 0, 220, 0.6),
        0 0 40px 10px rgba(100, 0, 180, 0.3) !important;
      border-color: rgba(200, 0, 255, 0.9) !important;
      animation: phoenix-glow-pulse 1.2s ease-in-out infinite alternate !important;
    }

    @keyframes phoenix-glow-pulse {
      0%   { box-shadow: 0 0 8px 3px rgba(160,0,255,0.9), 0 0 20px 6px rgba(130,0,220,0.6), 0 0 40px 10px rgba(100,0,180,0.3); }
      100% { box-shadow: 0 0 16px 7px rgba(200,0,255,1.0), 0 0 36px 14px rgba(160,0,240,0.8), 0 0 65px 20px rgba(120,0,200,0.4); }
    }

    /* 6フェニックス: 墓地から手札へ飛ぶカード（position:fixedで實坐標アニメ） */
    .phoenix-fly-card {
      position: fixed;
      z-index: 9999;
      width: 55px;
      height: 77px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, #1a0030 0%, #0d001a 100%),
        repeating-linear-gradient(45deg, rgba(160,0,255,0.08) 0px, rgba(160,0,255,0.08) 1px, transparent 1px, transparent 8px);
      border: 2px solid rgba(200, 0, 255, 0.9);
      box-shadow:
        0 0 12px rgba(180, 0, 255, 0.9),
        0 0 28px rgba(140, 0, 220, 0.6),
        inset 0 0 8px rgba(200, 0, 255, 0.2);
      pointer-events: none;
      transform-origin: center center;
    }

    /* カード裏面の紋様 */
    .phoenix-fly-card::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 5px;
      border: 1px solid rgba(200, 0, 255, 0.4);
      background: repeating-linear-gradient(
        60deg,
        transparent 0px, transparent 4px,
        rgba(160, 0, 255, 0.06) 4px, rgba(160, 0, 255, 0.06) 5px
      );
    }

    /* 墓地→手札飛翔の@keyframes
       初期位置(sx,sy)はinline styleのleft/topで設定。
       移動はtranslate(0,0)→translate(dx,dy)の補間。
       各区間に animation-timing-function を設定して緩急を実現。 */
    @keyframes phoenix-fly-anim {
      /* Phase 1 (0→25%): ゆっくり浮き上がる → 加速開始 */
      0% {
        transform: translate(-50%, -50%) scale(0.8) rotate(-30deg);
        opacity: 0.4;
        filter: blur(4px) brightness(0.9);
        box-shadow: 0 0 10px rgba(160,0,200,0.5);
        animation-timing-function: cubic-bezier(0.55, 0.0, 1.0, 0.45); /* 急加速 */
      }
      /* Phase 2 (25→65%): 最高速フライト */
      25% {
        opacity: 1;
        filter: blur(0px) brightness(2.0);
        box-shadow: 0 0 32px rgba(210,0,255,1), 0 0 70px rgba(170,0,240,0.9);
        animation-timing-function: cubic-bezier(0.2, 0.0, 0.8, 1.0); /* 高速維持 */
      }
      /* Phase 3 (65→90%): 急減速 */
      65% {
        opacity: 0.95;
        filter: blur(1px) brightness(1.5);
        box-shadow: 0 0 22px rgba(200,0,255,0.8), 0 0 50px rgba(160,0,230,0.6);
        animation-timing-function: cubic-bezier(0.0, 0.6, 0.3, 1.0); /* 急ブレーキ */
      }
      /* Phase 4 (90→100%): スーッと消える */
      90% {
        opacity: 0.6;
        filter: blur(2px) brightness(1.2);
      }
      100% {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.0) rotate(400deg);
        opacity: 0;
        filter: blur(6px) brightness(0.5);
        box-shadow: 0 0 8px rgba(180,0,255,0.3);
      }
    }
    /* 4シールド：カードの外側を覆う青いオーラ */
    .shielded-card::after {
      content: '';
      display: block !important;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: transparent;
      border: 2px solid rgba(0, 230, 255, 0.7);
      border-radius: inherit;
      pointer-events: none;
      z-index: 50; /* カード表面より前面に配置 */
      animation: shield-card-pulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }

    @keyframes shield-card-pulse {
      0% { 
        opacity: 0.7; 
        box-shadow: 
          0 0 10px rgba(0, 180, 255, 0.5), 
          0 0 20px rgba(0, 150, 255, 0.3), 
          inset 0 0 8px rgba(0, 200, 255, 0.2);
        border-color: rgba(0, 200, 255, 0.5);
      }
      100% { 
        opacity: 1; 
        box-shadow: 
          0 0 20px rgba(0, 255, 255, 0.9), 
          0 0 40px rgba(0, 200, 255, 0.6), 
          inset 0 0 15px rgba(0, 255, 255, 0.5); 
        border-color: rgba(0, 255, 255, 1);
      }
    }

    /* シールド弾き演出 */
    .shielded-card.shield-miss::after {
      animation: shield-card-repel 0.6s ease-out forwards !important;
    }

    @keyframes shield-card-repel {
      0% { 
        background: transparent; 
        box-shadow: 0 0 60px rgba(255, 255, 255, 1), inset 0 0 20px rgba(255, 255, 255, 0.9);
        border-color: #fff;
      }
      50% {
        background: transparent;
        box-shadow: 0 0 40px rgba(0, 255, 255, 0.9);
      }
      100% { 
        background: transparent; 
        box-shadow: 0 0 15px rgba(0, 200, 255, 0.8), inset 0 0 10px rgba(0, 200, 255, 0.3);
        border-color: rgba(0, 230, 255, 0.9);
      }
    }

    /* 6フェニックス: 炎 */
    .phoenix-fire {
      position: absolute;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 200;
      top: 0;
      left: 0;
      background: radial-gradient(circle at 80% 20%, rgba(231, 76, 60, 0.6) 0%, transparent 50%);
      mix-blend-mode: screen;
      animation: fire-rise 1s ease-in-out forwards;
    }

    @keyframes fire-rise {
      0% {
        opacity: 0;
        transform: translateY(50px);
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-100px);
      }
    }

    /* 8切り: ギロチン */
    .guillotine {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.8);
      z-index: 300;
      pointer-events: none;
      box-shadow: 0 0 20px 5px var(--color-blood);
      animation: g-drop 0.4s cubic-bezier(1, 0, 0.9, 1) forwards;
    }

    @keyframes g-drop {
      0% {
        transform: translate(-50%, -100vh) scaleX(10);
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      100% {
        transform: translate(-50%, 0) scaleX(1);
        opacity: 0;
      }
    }

    /* 9リバース: 回転矢印 */
    .reverse-arrows {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      pointer-events: none;
      z-index: 15;
      border-radius: 50%;
      border: 4px dashed rgba(241, 196, 15, 0.5);
      animation: r-spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes r-spin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) scale(0);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) rotate(-180deg) scale(1.5);
        opacity: 0;
      }
    }

    /* Qボンバー: 爆発 */
    .bomber-explode {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 250;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.9) 100%);
      mix-blend-mode: color-dodge;
      animation: blast 0.5s ease-out forwards;
    }

    @keyframes blast {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2);
      }
    }

    /* K監視: 目 */
    .evil-eye {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 40px;
      border-radius: 50%;
      background: #000;
      box-shadow: 0 0 20px #8e44ad;
      border: 2px solid #8e44ad;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
      pointer-events: none;
      animation: eye-open 0.5s forwards, pulse-eye 2s infinite alternate;
    }

    .evil-eye::after {
      content: '';
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #ff0 0%, #f00 100%);
      border-radius: 50%;
      animation: pupil 2s infinite alternate;
    }

    @keyframes eye-open {
      0% {
        height: 2px;
        opacity: 0;
      }

      100% {
        height: 40px;
        opacity: 1;
      }
    }

    @keyframes pulse-eye {
      0% {
        box-shadow: 0 0 10px #8e44ad;
      }

      100% {
        box-shadow: 0 0 30px #8e44ad, 0 0 10px #fff inset;
      }
    }

    @keyframes pupil {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(0.5);
      }
    }

    /* 5 SKIP chains */
    .skip-chains {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 100;
      border: 5px dotted rgba(255, 0, 0, 0.6);
      border-radius: 10px;

      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);

      letter-spacing: 5px;
      opacity: 0.8;

        transform: translate(calc(var(--tx) + var(--sway-x)), calc(var(--ty) + var(--sway-y))) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(calc(var(--base-scale) * 1.05));

    /* --- 神秘的な魔法ボタン (Mystic Magical Button) --- */
    .mystic-btn {
      position: relative;
      /* 磨かれた黒曜石に斜めのガラス/宝石光沢を合成 */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.03) 49%, transparent 50%, transparent 100%), linear-gradient(135deg, #2b2b2e 0%, #17171a 45%, #0e0e10 50%, #080809 100%) !important;

      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50"><text x="12" y="32" fill="rgba(255, 159, 28, 0.08)" font-family="Cinzel" font-size="11" letter-spacing="7">ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇ</text></svg>');

    .mystic-btn::after {

      left: 12px;
      top: 50%;
      transform: translateY(-50%);
